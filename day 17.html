<!DOCTYPE html>
<html>
<head>
    <title>Rehan Khan - Portfolio</title>
    <style>
        body {
            margin:0px;
            background:black;
            color:cyan;
          font-family:arial; text-align:center;
            padding-top:80px;
        }
        
        
        #hero-section {
            width: 300px;
            margin: auto;
            padding:auto;
            
            /* Day 18 ke 3 Shastra */
            border: 2px solid cyan;        /* 1. Border: Neeli lakeer */
            border-radius: 20px;              /* 2. Gola corner */
            box-shadow: 0px auto 25px cyan; 
        }
        
        /* Class = Photo ko gol karne ke liye */
        .gol-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;       /* 50% = pura gola */
            border: 4px solid cyan;
        }
        
        h1 {
            font-size: 40px;
            color:cyan;
            margin: 20px 0 10px 0;
        }
        
        button {
            background:transparent;
            color:cyan ;
            border: 2px solid cyan;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* Hover = Mouse le jao to rang badle */
        button:hover {
            background: cyan;
            color: black;
        }
    </style>
</head>
<body>
    <div id="hero-section">
        <img src="uvedul.jpg.jpg" alt="Rehan ki photo" class="gol-photo">
        <h1>Main Rehan Khan Hu</h1>
        <p>17 saal ka Frontend Developer banne wala hoon</p>
        <button>Hire Me</button>
    </div>
</body>
</html>
