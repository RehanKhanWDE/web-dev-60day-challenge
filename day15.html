<!DOCTYPE html>
<html>
<head>
  <title>Text Style</title>
  <style>
    h1 {
      color: red;
      text-align: center;
      font-size: 40px;
    }
    
    p {
      color:lightgreen;
      font-size: 20px;
      text-align: justify;
    }
  </style>
</head>
<body>
  <h1>Main Heading Hoon</h1>
  <p>Ye paragraph hai . Iska rang lightgreen hai aur text dono taraf se barabar hai. Ise justify bolte hai </p>
</body>
</html>
