<!DOCTYPE html>
<html>
<head>
<title>Day 23 flex-box</title>
  <style>
    body {
      flex-direction:column;
      display: flex;           /* Line me lagao  */
      justify-content: center; /* Left-Right center */
      align-items: center;     /* Upar-Neeche center */
      gap: 20px;               /* Box ke beech gap */
      height: 100vh;           /* Puri screen */
      background: black;
      margin: 0;
    }

    .box {
      width: 100px;
      height: 100px;
      background: cyan;
      color: white;
      font-size: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</body>
</html>
